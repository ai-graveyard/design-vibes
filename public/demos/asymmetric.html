<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asymmetric Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-white">
  <div class="w-full h-screen flex items-center justify-center p-8">
    <div class="relative w-80 h-80">
      <div class="absolute top-0 left-0 w-48 h-32 bg-black"></div>
      <div class="absolute top-8 right-0 w-32 h-48 bg-gray-300"></div>
      <div class="absolute bottom-0 left-12 w-24 h-24 bg-red-500"></div>
      <div class="absolute top-24 left-24 w-32 h-16 bg-white border-2 border-black flex items-center justify-center">
        <span class="font-bold">BALANCE</span>
      </div>
    </div>
  </div>
</body>
</html>
