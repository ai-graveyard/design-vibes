<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Style Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-white">
  <div class="w-full h-screen flex flex-col items-center justify-center p-8">
    <div class="text-center">
      <div class="w-32 h-32 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-sm bg-gradient-to-br from-gray-100 to-gray-200">
        <div class="w-20 h-20 rounded-2xl bg-black"></div>
      </div>
      <h1 class="text-4xl font-semibold mb-2 tracking-tight text-gray-900">Product</h1>
      <p class="text-lg mb-6 text-gray-500">Pro. Beyond.</p>
      <button class="bg-blue-600 text-white px-6 py-2.5 rounded-full text-sm font-medium hover:bg-blue-700 transition-colors">
        Learn more
      </button>
    </div>
  </div>
</body>
</html>
