<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphism Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #e0e5ec; }
    .neu {
      background: #e0e5ec;
      box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
      border-radius: 20px;
    }
    .neu-inset {
      background: #e0e5ec;
      box-shadow: inset 6px 6px 10px 0 rgba(163,177,198, 0.7), inset -6px -6px 10px 0 rgba(255,255,255, 0.8);
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="w-full h-screen flex items-center justify-center p-8">
    <div class="neu p-8 max-w-sm w-full">
      <h2 class="text-xl font-bold text-gray-700 mb-6 text-center">Neumorphism</h2>
      <div class="neu-inset p-4 mb-4">
        <p class="text-gray-600 text-sm">Soft, subtle, tactile interface design.</p>
      </div>
      <div class="flex justify-center gap-4">
        <button class="neu w-14 h-14 flex items-center justify-center text-gray-600">●</button>
        <button class="neu w-14 h-14 flex items-center justify-center text-gray-600">■</button>
        <button class="neu w-14 h-14 flex items-center justify-center text-gray-600">▲</button>
      </div>
    </div>
  </div>
</body>
</html>
