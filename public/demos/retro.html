<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', cursive; }
    .pixel-border {
      box-shadow: 
        -4px 0 0 0 black,
        4px 0 0 0 black,
        0 -4px 0 0 black,
        0 4px 0 0 black;
    }
  </style>
</head>
<body class="bg-blue-900">
  <div class="w-full h-screen flex flex-col items-center justify-center p-8">
    <div class="bg-yellow-400 p-4 mb-6 pixel-border">
      <h1 class="text-2xl text-black">RETRO</h1>
    </div>
    <div class="grid grid-cols-4 gap-2 mb-6">
      <div class="w-8 h-8 bg-red-500"></div>
      <div class="w-8 h-8 bg-orange-500"></div>
      <div class="w-8 h-8 bg-yellow-500"></div>
      <div class="w-8 h-8 bg-green-500"></div>
    </div>
    <p class="text-white text-xs text-center">INSERT COIN TO PLAY</p>
    <div class="flex gap-4 mt-4">
      <div class="w-12 h-12 rounded-full bg-red-600 border-4 border-red-800"></div>
      <div class="w-12 h-12 rounded-full bg-red-600 border-4 border-red-800"></div>
    </div>
  </div>
</body>
</html>
