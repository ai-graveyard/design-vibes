<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand-drawn Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap');
    body { font-family: 'Caveat', cursive; }
    .wobbly-border {
      border: 3px solid #333;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
    }
  </style>
</head>
<body class="bg-yellow-50">
  <div class="w-full h-screen flex items-center justify-center p-8">
    <div class="wobbly-border bg-white p-8 max-w-sm">
      <h2 class="text-4xl text-gray-800 mb-4">Hand Crafted</h2>
      <p class="text-xl text-gray-600 mb-6">Imperfect is perfect. Every stroke tells a story.</p>
      <div class="flex gap-4">
        <div class="wobbly-border w-12 h-12 bg-pink-300"></div>
        <div class="wobbly-border w-12 h-12 bg-blue-300"></div>
        <div class="wobbly-border w-12 h-12 bg-green-300"></div>
      </div>
    </div>
  </div>
</body>
</html>
