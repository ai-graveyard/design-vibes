<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memphis Style Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-white">
  <div class="w-full h-screen flex items-center justify-center p-4 bg-pink-100">
    <div class="relative w-64 h-64">
      <div class="absolute top-0 left-0 w-16 h-16 bg-cyan-400 rounded-full border-4 border-black"></div>
      <div class="absolute top-8 right-0 w-12 h-12 bg-yellow-400 border-4 border-black"></div>
      <div class="absolute bottom-8 left-4 w-20 h-20 bg-pink-500 border-4 border-black"></div>
      <div class="absolute bottom-0 right-8 w-16 h-16 bg-green-400 transform rotate-12 border-4 border-black"></div>
      <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
        <div class="w-24 h-24 bg-white border-4 border-black flex items-center justify-center">
          <span class="font-black text-xl text-black">WOW</span>
        </div>
      </div>
      <div class="absolute top-4 left-1/2 w-8 h-8 bg-black"></div>
      <div class="absolute bottom-4 right-4 w-6 h-6 bg-purple-500 rounded-full"></div>
    </div>
  </div>
</body>
</html>
