<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaporwave Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    body { font-family: 'VT323', monospace; }
    .retro-text {
      text-shadow: 3px 3px 0px #ff00ff;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-pink-400 via-purple-500 to-indigo-900">
  <div class="w-full h-screen flex flex-col items-center justify-center p-8">
    <div class="text-center">
      <h1 class="text-6xl text-cyan-300 retro-text mb-4">AESTHETIC</h1>
      <div class="w-64 h-32 bg-gradient-to-b from-orange-400 to-yellow-300 mb-4 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-t from-purple-900/50 to-transparent"></div>
        <div class="absolute bottom-0 w-full h-1/2 bg-gradient-to-t from-purple-900 to-transparent"></div>
      </div>
      <p class="text-pink-300 text-2xl">ＶＡＰＯＲＷＡＶＥ</p>
      <div class="flex justify-center gap-4 mt-4">
        <span class="text-cyan-300 text-xl">▲</span>
        <span class="text-pink-300 text-xl">●</span>
        <span class="text-yellow-300 text-xl">■</span>
      </div>
    </div>
  </div>
</body>
</html>
