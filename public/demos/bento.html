<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento 网格风格 Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 40px;
      text-align: center;
    }
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 200px;
      gap: 20px;
    }
    .bento-item {
      background: #fff;
      border-radius: 24px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .bento-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }
    .bento-item.large {
      grid-column: span 2;
      grid-row: span 2;
    }
    .bento-item.wide {
      grid-column: span 2;
    }
    .bento-item.tall {
      grid-row: span 2;
    }
    .bento-item.blue { background: linear-gradient(135deg, #007AFF, #5856D6); color: #fff; }
    .bento-item.green { background: linear-gradient(135deg, #34C759, #30D158); color: #fff; }
    .bento-item.orange { background: linear-gradient(135deg, #FF9500, #FF6B00); color: #fff; }
    .bento-item.purple { background: linear-gradient(135deg, #AF52DE, #BF5AF2); color: #fff; }
    .bento-item h3 {
      font-size: 24px;
      font-weight: 600;
    }
    .bento-item p {
      font-size: 16px;
      opacity: 0.9;
    }
    .bento-item .icon {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    @media (max-width: 768px) {
      .bento-grid { grid-template-columns: repeat(2, 1fr); }
      .bento-item.large { grid-column: span 2; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bento Grid</h1>
    <div class="bento-grid">
      <div class="bento-item large blue">
        <div class="icon">📱</div>
        <div>
          <h3>Product</h3>
          <p>The main feature card with more space for content.</p>
        </div>
      </div>
      <div class="bento-item green">
        <div class="icon">⚡</div>
        <h3>Fast</h3>
      </div>
      <div class="bento-item orange">
        <div class="icon">🎨</div>
        <h3>Design</h3>
      </div>
      <div class="bento-item tall purple">
        <div class="icon">🔒</div>
        <div>
          <h3>Secure</h3>
          <p>Your data is protected with end-to-end encryption.</p>
        </div>
      </div>
      <div class="bento-item wide">
        <h3>Statistics</h3>
        <p>View your analytics and insights in real-time.</p>
      </div>
      <div class="bento-item">
        <h3>Users</h3>
        <p>10K+</p>
      </div>
    </div>
  </div>
</body>
</html>
