<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-900">
  <div class="w-full h-screen flex items-center justify-center p-8">
    <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full border border-gray-700">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-pink-500"></div>
        <div>
          <h2 class="text-white font-semibold">Dark Interface</h2>
          <p class="text-gray-400 text-sm">Easy on the eyes</p>
        </div>
      </div>
      <div class="space-y-3">
        <div class="bg-gray-700 rounded-lg p-4">
          <p class="text-gray-300 text-sm">Reduced eye strain in low light</p>
        </div>
        <div class="bg-gray-700 rounded-lg p-4">
          <p class="text-gray-300 text-sm">Better battery life on OLED</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
