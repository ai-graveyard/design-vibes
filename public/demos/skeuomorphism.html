<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeuomorphism Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .leather {
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #8B4513 100%);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.3);
    }
    .stitch {
      border: 2px dashed rgba(255,255,255,0.3);
    }
    .button-3d {
      background: linear-gradient(180deg, #f0f0f0 0%, #d0d0d0 100%);
      box-shadow: 0 4px 0 #999, 0 5px 10px rgba(0,0,0,0.3);
      border-radius: 50%;
    }
    .button-3d:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 #999, 0 1px 5px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body class="bg-stone-300">
  <div class="w-full h-screen flex items-center justify-center p-8">
    <div class="leather rounded-3xl p-8 max-w-sm w-full">
      <div class="stitch rounded-2xl p-6">
        <h2 class="text-white text-center font-bold text-xl mb-6">Realistic</h2>
        <div class="flex justify-center gap-6">
          <button class="button-3d w-16 h-16 flex items-center justify-center text-2xl">●</button>
          <button class="button-3d w-16 h-16 flex items-center justify-center text-2xl">■</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
