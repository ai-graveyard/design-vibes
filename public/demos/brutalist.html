<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brutalist Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
    body { font-family: 'Courier Prime', monospace; }
  </style>
</head>
<body class="bg-black">
  <div class="w-full h-screen flex flex-col p-8">
    <div class="border-4 border-white p-6 mb-4">
      <h1 class="text-4xl font-bold text-white uppercase">BRUTALIST</h1>
    </div>
    <div class="flex-1 border-4 border-white p-6">
      <p class="text-white text-lg mb-4">Raw. Honest. Unapologetic.</p>
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white p-4">
          <p class="text-black font-bold">NO DECORATION</p>
        </div>
        <div class="bg-white p-4">
          <p class="text-black font-bold">PURE FUNCTION</p>
        </div>
      </div>
    </div>
    <div class="mt-4 bg-white p-4">
      <p class="text-black font-bold text-center">ENTER →</p>
    </div>
  </div>
</body>
</html>
