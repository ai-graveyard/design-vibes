<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双色调风格 Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #1e3a8a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .duotone-container {
      text-align: center;
      padding: 60px;
      background: linear-gradient(135deg, #1e3a8a 0%, #f97316 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .duotone-container h1 {
      font-size: 100px;
      font-weight: 900;
      color: #fff;
      mix-blend-mode: overlay;
      letter-spacing: -0.05em;
    }
    .duotone-container p {
      font-size: 24px;
      color: rgba(255,255,255,0.8);
      margin-top: 20px;
    }
    @media (max-width: 768px) {
      .duotone-container h1 { font-size: 48px; }
      .duotone-container p { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="duotone-container">
    <h1>DUOTONE</h1>
    <p>Two colors. Maximum impact.</p>
  </div>
</body>
</html>
