<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flat Design Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');
    body { font-family: 'Open Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-50">
  <div class="w-full h-screen flex items-center justify-center p-8">
    <div class="grid grid-cols-2 gap-4 max-w-sm">
      <div class="bg-emerald-400 p-6 text-white">
        <div class="w-12 h-12 bg-white/30 mb-4"></div>
        <p class="font-bold">FLAT</p>
      </div>
      <div class="bg-amber-400 p-6 text-white">
        <div class="w-12 h-12 bg-white/30 mb-4"></div>
        <p class="font-bold">SIMPLE</p>
      </div>
      <div class="bg-rose-400 p-6 text-white">
        <div class="w-12 h-12 bg-white/30 mb-4"></div>
        <p class="font-bold">CLEAN</p>
      </div>
      <div class="bg-sky-400 p-6 text-white">
        <div class="w-12 h-12 bg-white/30 mb-4"></div>
        <p class="font-bold">BOLD</p>
      </div>
    </div>
  </div>
</body>
</html>
