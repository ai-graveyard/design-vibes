<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glass {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-500 via-pink-500 to-orange-400">
  <div class="w-full h-screen flex items-center justify-center p-8">
    <div class="glass rounded-3xl p-8 max-w-md w-full">
      <h2 class="text-2xl font-bold text-white mb-4">Glass Card</h2>
      <p class="text-white/80 mb-6">A beautiful glassmorphism effect with backdrop blur and transparency.</p>
      <div class="flex gap-4">
        <div class="w-12 h-12 rounded-full bg-white/30"></div>
        <div class="w-12 h-12 rounded-full bg-white/20"></div>
        <div class="w-12 h-12 rounded-full bg-white/40"></div>
      </div>
    </div>
  </div>
</body>
</html>
