<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斯堪的纳维亚风格 Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .hero {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .content {
      max-width: 600px;
      text-align: center;
    }
    .content h1 {
      font-size: 48px;
      font-weight: 300;
      color: #5a6b5c;
      margin-bottom: 20px;
    }
    .content p {
      font-size: 18px;
      color: #666;
      line-height: 1.8;
    }
    .colors {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 60px;
    }
    .color {
      width: 80px;
      height: 80px;
      border-radius: 8px;
    }
    .color:nth-child(1) { background: #d4c4b7; }
    .color:nth-child(2) { background: #8b9a7c; }
    .color:nth-child(3) { background: #e8dcc4; }
    @media (max-width: 768px) {
      .hero { padding: 40px 20px; }
      .content h1 { font-size: 32px; }
      .content p { font-size: 14px; }
      .colors { gap: 10px; margin-top: 40px; }
      .color { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="content">
      <h1>Hygge Living</h1>
      <p>Comfort, warmth, and simplicity. Design that feels like home.</p>
      <div class="colors">
        <div class="color"></div>
        <div class="color"></div>
        <div class="color"></div>
      </div>
    </div>
  </section>
</body>
</html>
