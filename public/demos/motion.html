<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-pulse-slow { animation: pulse 2s ease-in-out infinite; }
    .animate-bounce-slow { animation: bounce 1.5s ease-in-out infinite; }
    .animate-spin-slow { animation: spin 3s linear infinite; }
  </style>
</head>
<body class="bg-black">
  <div class="w-full h-screen flex flex-col items-center justify-center p-8">
    <div class="flex gap-8 mb-8">
      <div class="w-16 h-16 bg-cyan-400 rounded-full animate-pulse-slow"></div>
      <div class="w-16 h-16 bg-pink-500 rounded-full animate-bounce-slow"></div>
      <div class="w-16 h-16 bg-yellow-400 rounded-full animate-spin-slow"></div>
    </div>
    <h2 class="text-2xl font-bold text-white mb-2">Motion Design</h2>
    <p class="text-gray-400">Bring interfaces to life</p>
  </div>
</body>
</html>
