<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bauhaus Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-white">
  <div class="w-full h-screen flex items-center justify-center p-4">
    <div class="relative w-48 h-48">
      <div class="absolute top-0 left-0 w-20 h-20 bg-red-600 rounded-full"></div>
      <div class="absolute top-4 right-4 w-16 h-16 bg-yellow-400 transform rotate-45"></div>
      <div class="absolute bottom-0 left-8 w-24 h-24 bg-blue-600"></div>
      <div class="absolute bottom-8 right-0 w-12 h-12 bg-black transform rotate-12"></div>
      <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 font-bold text-lg text-black">
        BAUHAUS
      </div>
    </div>
  </div>
</body>
</html>
